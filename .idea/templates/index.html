<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enchanted Archive</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Enchanted Archive</h1>

    <form method="GET">
        <input name="q" placeholder="Search">
        <button>Search</button>
    </form>

    <div class="grid">
        {% for book in books %}
        <div class="card">

            <img src="{{ book.image }}" width="100%">

            <h3 class="title styled-title"
                data-color="{{ styles[book.title].color if book.title in styles else '' }}"
                data-size="{{ styles[book.title].size if book.title in styles else '' }}"
                data-font="{{ styles[book.title].font if book.title in styles else '' }}">
                {{ book.title }}
            </h3>

            <p>{{ book.price }}</p>

            <p>
                ⭐ {{ "%.1f"|format(averages[book.title]) if book.title in averages else "No ratings" }}
            </p>

            <a href="/book/{{ book.title }}">Open</a>

            <form method="POST" action="/save_style">
                <input type="hidden" name="title" value="{{ book.title }}">
                <input type="color" name="color">
                <input type="number" name="size">
                <select name="font">
                    <option>serif</option>
                    <option>sans-serif</option>
                    <option>cursive</option>
                </select>
                <button>Save</button>
            </form>

        </div>
        {% endfor %}
    </div>
</div>

<script>
    document.querySelectorAll(".styled-title").forEach(el => {
        if (el.dataset.color) el.style.color = el.dataset.color;
        if (el.dataset.size) el.style.fontSize = el.dataset.size + "px";
        if (el.dataset.font) el.style.fontFamily = el.dataset.font;
    });
</script>
</body>
</html>
