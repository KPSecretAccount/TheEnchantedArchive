<h1>{{ book.title }}</h1>
<img src="{{ book.image }}">

<h2>Leave a Review</h2>

<form method="POST">
    <select name="rating">
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
    </select>

    <input type="text" name="comment" placeholder="Write review">
    <button>Submit</button>
</form>

<h2>Reviews</h2>
{% for r in reviews %}
<p>⭐ {{ r.rating }} - {{ r.comment }}</p>
{% endfor %}

<a href="/">Back</a>
