{% extends "base.html" %}
{% block content %}

<h1>Search Books</h1>

<form method="POST">
    <input type="text" name="search" placeholder="Search books..." required>
    <button type="submit">Search</button>
</form>

{% for b in books %}
<div class="card">
    <img src="{{ b.image }}">
    <h3>{{ b.title }}</h3>
    <p>{{ b.author }}</p>
    <p>Rating: {{ b.rating }}</p>
</div>
{% endfor %}

{% endblock %}
